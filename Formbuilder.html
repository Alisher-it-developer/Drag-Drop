<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Form Builder</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f6f8fb; color: #222; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .section { margin-bottom: 20px; }
    .section h3 { margin-bottom: 8px; }
    .field { margin-bottom: 12px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; }
    button { background: #0078d4; color: white; border: none; padding: 10px 14px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Activity Form</h2>
    <div class="section">
      <h3>Activity Details</h3>
      <div class="field">
        <label>Activity Name</label>
        <input type="text" placeholder="Enter activity name" />
      </div>
      <div class="field">
        <label>Activity Type</label>
        <select>
          <option>Meeting</option>
          <option>Training</option>
          <option>Task</option>
          <option>Follow-up</option>
        </select>
      </div>
      <div class="field">
        <label>Description</label>
        <textarea rows="4" placeholder="Enter description"></textarea>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" />
      </div>
      <button>Add Activity</button>
    </div>
  </div>
</body>
</html>
